name: Smart NVR
definition: >
  This pipeline processes video streams with AI-based analytics including object detection, tracking,
  and classification. Outputs include video recording, metadata, and processed video frames.
tags:
  - Smart Cities
thumbnail: images/smart-nvr.png
variants:
  - name: CPU
    pipeline_description: >-
      filesrc location=/videos/input/people.mp4 !
      parsebin !
      tee name=t0 !
      queue !
      splitmuxsink location=/tmp/people-output.mp4
      t0. !
      queue !
      avdec_h264 !
      video/x-raw !
      gvafpscounter starting-frame=300 !
      gvadetect
        model=/models/output/public/yolo11n/INT8/yolo11n.xml
        model-instance-id=detect0
        pre-process-backend=opencv
        device=CPU
        batch-size=0
        inference-interval=3
        inference-region=full-frame
        nireq=2 !
      queue !
      gvatrack tracking-type=short-term-imageless !
      queue !
      gvaclassify
        model=/models/output/omz/mobilenet-v2-pytorch/FP16/mobilenet-v2-pytorch.xml
        model-proc=/models/output/omz/mobilenet-v2-pytorch/mobilenet-v2.json
        model-instance-id=classify0
        pre-process-backend=opencv
        device=CPU
        batch-size=2
        inference-interval=3
        nireq=2
        inference-region=roi-list
        reclassify-interval=1 !
      queue !
      gvawatermark !
      gvametaconvert format=json json-indent=4 !
      gvametapublish method=file file-path=/dev/null !
      videoscale !
      video/x-raw,width=960,height=540 !
      fakesink name=default_output_sink async=false sync=false
